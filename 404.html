<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomly - Page Not Found</title>
    <script>
        (function() {
            const path = window.location.pathname.replace(/\/+$/, '') || '/';

            if (path === '/admin' || path === '/admin/index.html') {
                window.location.replace('/admin/');
                return;
            }

            if (path === '/admin/login' || path === '/admin/login.html') {
                window.location.replace('/admin/login/');
                return;
            }

            if (path === '/about' || path === '/about.html') {
                window.location.replace('/about/');
                return;
            }

            if (path === '/blog' || path === '/blog.html') {
                window.location.replace('/blog/');
                return;
            }

            if (path === '/blog-post' || path === '/blog-post.html') {
                window.location.replace('/blog-post/');
                return;
            }

            if (path === '/subscribe' || path === '/subscribe.html') {
                window.location.replace('/subscribe/');
                return;
            }

            if (path === '/appointments' || path.startsWith('/appointments/')) {
                window.location.replace('/');
                return;
            }

            if (path === '/people' || path === '/profile' || path === '/members') {
                window.location.replace('/members/');
                return;
            }

            if (path === '/team') {
                window.location.replace('/about/');
                return;
            }

            const profileMatch = path.match(/^\/(people|team|profile|members)\/(.+)$/);
            if (profileMatch) {
                const slug = profileMatch[2].replace(/\.html$/, '');
                if (slug && slug !== 'index') {
                    window.location.replace('/members/?id=' + encodeURIComponent(slug));
                    return;
                }
                window.location.replace('/members/');
                return;
            }

            const blogMatch = path.match(/^\/blog\/([^/]+)$/);
            if (blogMatch) {
                const slug = blogMatch[1].replace(/\.html$/, '').replace(/-+$/, '');
                if (slug && slug !== 'index') {
                    window.location.replace('/blog-post/?slug=' + encodeURIComponent(slug));
                    return;
                }
            }

            window.location.replace('/');
        })();
    </script>
</head>
<body>
    <p>Redirecting…</p>
</body>
</html>
