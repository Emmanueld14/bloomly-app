<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomly Logo Preview</title>
    <link rel="stylesheet" href="/styles.css?v=20260705c">
    <style>
        body {
            margin: 0;
            padding: 40px;
            background: var(--gradient-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .preview-container {
            background: var(--color-white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(var(--color-black-rgb), 0.3);
            text-align: center;
        }
        .logo-wrapper {
            margin: 20px 0;
        }
        h1 {
            color: var(--color-heading);
            margin-bottom: 10px;
        }
        p {
            color: var(--color-gray-500);
            margin-top: 0;
        }
        .sizes {
            display: flex;
            gap: 30px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
        }
        .size-item {
            text-align: center;
        }
        .size-item h3 {
            color: var(--color-heading);
            font-size: 14px;
            margin-bottom: 10px;
        }
        .navbar-preview {
            margin-top: 40px;
            padding: 16px 24px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(var(--color-black-rgb), 0.08);
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <h1>Bloomly Logo Preview</h1>
        <p>Official Bloomly wordmark with butterfly, script text, and heart</p>
        
        <div class="logo-wrapper">
            <img src="/logo.png" alt="Bloomly" style="max-width: 100%; height: auto;">
        </div>
        
        <div class="sizes">
            <div class="size-item">
                <h3>Mobile navbar (56px)</h3>
                <img src="/logo.png" alt="Bloomly" class="logo-image" height="56">
            </div>
            <div class="size-item">
                <h3>Desktop navbar (70px)</h3>
                <img src="/logo.png" alt="Bloomly" class="logo-image" height="70">
            </div>
            <div class="size-item">
                <h3>Medium (120px)</h3>
                <img src="/logo.png" alt="Bloomly" style="height: 120px; width: auto;">
            </div>
            <div class="size-item">
                <h3>Large (200px)</h3>
                <img src="/logo.png" alt="Bloomly" style="height: 200px; width: auto;">
            </div>
        </div>

        <div class="navbar-preview">
            <a href="/" class="logo-container">
                <img src="/logo.png" alt="Bloomly" class="logo-image" height="70" decoding="async">
            </a>
        </div>
    </div>
</body>
</html>
