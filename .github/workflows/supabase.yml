name: Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/**'
      - 'content/blog/**'
      - 'scripts/seed-blog-posts.js'
      - '.github/workflows/supabase.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: xmhyjttyarskimsxcfhl
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Push database migrations
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: supabase db push
        continue-on-error: true

      - name: Deploy admin Edge Functions
        if: env.SUPABASE_ACCESS_TOKEN != ''
        run: |
          supabase functions deploy admin-stats --no-verify-jwt
          supabase functions deploy admin-posts --no-verify-jwt
          supabase functions deploy admin-bookings --no-verify-jwt
          supabase functions deploy admin-subscribers --no-verify-jwt
          supabase functions deploy admin-counsellor-applications --no-verify-jwt

      - name: Seed blog posts from repo markdown
        if: env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != ''
        run: node scripts/seed-blog-posts.js

      - name: Deploy summary
        if: always()
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::Add SUPABASE_ACCESS_TOKEN to GitHub repo secrets for automatic function deploy."
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::Add SUPABASE_SERVICE_ROLE_KEY to GitHub secrets to seed blog posts on push."
          fi
